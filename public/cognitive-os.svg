<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0f0f23"/>
  <rect x="40" y="40" width="720" height="520" rx="20" fill="#13162d" stroke="#2a2d4a" stroke-width="2"/>
  <!-- Brain/Neural network visualization -->
  <circle cx="400" cy="250" r="120" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="250" r="40" fill="none" stroke="#c4b5fd" stroke-width="1" opacity="0.7"/>
  <!-- Neural nodes -->
  <circle cx="320" cy="200" r="8" fill="#7c3aed"/>
  <circle cx="480" cy="200" r="8" fill="#7c3aed"/>
  <circle cx="350" cy="300" r="8" fill="#a78bfa"/>
  <circle cx="450" cy="300" r="8" fill="#a78bfa"/>
  <circle cx="400" cy="180" r="8" fill="#c4b5fd"/>
  <circle cx="400" cy="320" r="8" fill="#c4b5fd"/>
  <!-- Connections -->
  <line x1="320" y1="200" x2="400" y2="180" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <line x1="480" y1="200" x2="400" y2="180" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <line x1="350" y1="300" x2="400" y2="320" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <line x1="450" y1="300" x2="400" y2="320" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="200" x2="350" y2="300" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="200" x2="450" y2="300" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
  <!-- Central brain icon -->
  <circle cx="400" cy="250" r="15" fill="#7c3aed" opacity="0.8"/>
  <!-- Dashboard elements at bottom -->
  <rect x="100" y="420" width="180" height="80" rx="10" fill="#1a1a3e" stroke="#3b3d5e" stroke-width="1"/>
  <rect x="310" y="420" width="180" height="80" rx="10" fill="#1a1a3e" stroke="#3b3d5e" stroke-width="1"/>
  <rect x="520" y="420" width="180" height="80" rx="10" fill="#1a1a3e" stroke="#3b3d5e" stroke-width="1"/>
  <!-- Graph lines in dashboard cards -->
  <polyline points="120,475 140,460 160,470 180,450 200,455 220,440 240,445 260,435" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <polyline points="330,470 350,460 370,465 390,445 410,450 430,440 450,430 470,435" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <polyline points="540,475 560,465 580,470 600,455 620,460 640,445 660,450 680,440" fill="none" stroke="#34d399" stroke-width="2"/>
  <!-- Title -->
  <text x="400" y="560" text-anchor="middle" font-family="monospace" font-size="14" fill="#a78bfa" opacity="0.8">COGNITIVE-OS</text>
</svg>
